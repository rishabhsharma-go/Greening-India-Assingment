version: "3.9"

networks:
  gims_net:
    driver: bridge

volumes:
  postgres_data:

services:
  # ─────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - gims_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - gims_net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - gims_net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server kafka:9092 --list > /dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - gims_net

  # ─────────────────────────────────────────
  # Application Services (Rust)
  # ─────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile.rust
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      MANAGEMENT_SERVICE_URL: http://management:8001
      GEOSPATIAL_SERVICE_URL: http://geospatial:8002
      TELEMETRY_SERVICE_URL: http://telemetry:8003
      CARBON_SERVICE_URL: http://carbon:8004
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gims_net
    restart: unless-stopped

  management:
    build:
      context: .
      dockerfile: services/management/Dockerfile.rust
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MANAGEMENT_PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gims_net
    restart: unless-stopped

  geospatial:
    build:
      context: .
      dockerfile: services/geospatial/Dockerfile.rust
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GEOSPATIAL_PORT: 8002
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gims_net
    restart: unless-stopped

  telemetry:
    build:
      context: .
      dockerfile: services/telemetry/Dockerfile.rust
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TELEMETRY_PORT: 8003
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: telemetry.events
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - gims_net
    restart: unless-stopped

  carbon:
    build:
      context: .
      dockerfile: services/carbon/Dockerfile.rust
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CARBON_PORT: 8004
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: telemetry.events
      KAFKA_GROUP_ID: carbon-service
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - gims_net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - gateway
    networks:
      - gims_net
    restart: unless-stopped
