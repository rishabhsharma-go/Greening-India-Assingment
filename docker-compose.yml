version: "3.9"

services:
  db:
    image: postgres:15
    container_name: taskflow-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: taskflow-backend
    depends_on:
      - db
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: always

  frontend:
    build: ./frontend
    container_name: taskflow-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  pgdata: