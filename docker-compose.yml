version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-taskflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB:       ${POSTGRES_DB:-taskflow}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskflow} -d ${POSTGRES_DB:-taskflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Go API ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:    ${DATABASE_URL:-postgres://taskflow:changeme@db:5432/taskflow?sslmode=disable}
      JWT_SECRET:      ${JWT_SECRET:?JWT_SECRET is required — see .env.example}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      PORT:            ${PORT:-4000}
      APP_ENV:         ${APP_ENV:-production}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Seed (runs once, then exits) ────────────────────────────────────────────
  seed:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      api:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - ./backend/scripts/seed.sql:/seed.sql:ro
    command: >
      psql
        -h db
        -U ${POSTGRES_USER:-taskflow}
        -d ${POSTGRES_DB:-taskflow}
        -f /seed.sql

volumes:
  pg_data:
