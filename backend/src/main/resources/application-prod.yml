# Production profile — active when SPRING_PROFILES_ACTIVE=prod

spring:
  datasource:
    # URL resolution priority (handled by RailwayDatabaseEnvironmentPostProcessor):
    #  1. SPRING_DATASOURCE_URL  – explicit JDBC URL override
    #  2. DATABASE_PUBLIC_URL    – Railway public TCP-proxy (postgresql:// format, auto-converted)
    #  3. DATABASE_URL           – Railway internal network URL (auto-converted)
    #  4. PGHOST/PGPORT/PGDATABASE – individual Railway PG vars (auto-assembled)
    #
    # The YAML placeholders below act as a final fallback if the processor
    # did not inject a value (e.g. local Docker Compose run with explicit vars).
    url: ${spring.datasource.url:${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:railway}}}
    username: ${spring.datasource.username:${SPRING_DATASOURCE_USERNAME:${PGUSER:taskflow}}}
    password: ${spring.datasource.password:${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:taskflow}}}

logging:
  level:
    root: WARN
    com.taskflow: INFO

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

